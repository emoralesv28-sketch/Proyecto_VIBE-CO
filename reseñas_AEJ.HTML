<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe & Co. | Reseñas</title>
    <link rel="stylesheet" href="css/style_Reseñas_EAJ.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">
            <h1>vibe & co.</h1>
            <p>moda con esencia</p>
        </div>
        <nav>
            <ul>
                <li><a href="Index_AEJ.HTML">Inicio</a></li>
                <li><a href="categorias_AEJ.HTML">Categorías</a></li>
                <li><a href="Promociones_AEJ.HTML">Promociones</a></li>
                <li><a href="reseñas_AEJ.HTML">Reseñas</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-shopping-bag"></i>
            <i class="fas fa-user"></i>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="page-header">
            <h2>Lo que dicen nuestros clientes</h2>
            <p>Más de 1000 reseñas positivas</p>
        </div>

        <!-- Resumen de calificaciones -->
        <div class="rating-summary">
            <div class="rating-score">
                <span class="score">4.8</span>
                <div class="stars">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star-half-alt"></i>
                </div>
                <p>Basado en 1,234 reseñas</p>
            </div>
        </div>

        <!-- Formulario para agregar reseña (dinámico) -->
        <div class="agregar-resena">
            <h3>Deja tu reseña</h3>
            <form id="formResena">
                <div class="form-group">
                    <input type="text" id="nombreResena" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <select id="estrellasResena">
                        <option value="5">★★★★★ (5 estrellas)</option>
                        <option value="4">★★★★☆ (4 estrellas)</option>
                        <option value="3">★★★☆☆ (3 estrellas)</option>
                        <option value="2">★★☆☆☆ (2 estrellas)</option>
                        <option value="1">★☆☆☆☆ (1 estrella)</option>
                    </select>
                </div>
                <div class="form-group">
                    <textarea id="comentarioResena" placeholder="Cuéntanos tu experiencia..." rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-enviar">Enviar reseña</button>
            </form>
        </div>

        <!-- Lista de reseñas -->
        <div class="resenas-grid" id="resenasGrid">
            <!-- Las reseñas se cargarán dinámicamente con JS -->
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="footer-grid">
            <div class="footer-col">
                <h3>vibe & co.</h3>
                <div class="redes">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Vibe & Co. | De AEJ </p>
        </div>
    </div>
</footer>

<script src="js/main_AEJ.js"></script>
</body>
</html>
